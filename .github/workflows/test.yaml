name: Test Workflow Schedule Debug

on:
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: Skip the Terraform workflow for this manual run?
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  schedule:
    - cron: "15 5 * * 1-5"
    - cron: "0 11 * * 1-5"
    - cron: "0 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "0 19 * * 1-5"


jobs:
  always-debug:
    name: Always Debug
    runs-on: ubuntu-latest

    steps:
      - name: Echo Date
        run: date

      - name: Echo Event Name
        run: echo "github.event_name=${{ github.event_name }}"

      - name: Echo Event Schedule
        run: echo "github.event.schedule=${{ github.event.schedule || 'N/A' }}"


  conditional-debug:
    name: Conditional Debug
    runs-on: ubuntu-latest

    if: >
      (github.event_name == 'workflow_dispatch' && inputs.skip_terraform != 'true') ||
      github.event_name == 'push' ||
      (github.event_name == 'schedule' &&
       github.event.schedule != '0 11 * * 1-5' &&
       github.event.schedule != '0 14 * * 1-5' &&
       github.event.schedule != '0 17 * * 1-5' &&
       github.event.schedule != '0 19 * * 1-5')

    steps:
      - name: Echo Date
        run: date

      - name: Echo Event Name
        run: echo "github.event_name=${{ github.event_name }}"

      - name: Echo Event Schedule
        run: echo "github.event.schedule=${{ github.event.schedule || 'N/A' }}"