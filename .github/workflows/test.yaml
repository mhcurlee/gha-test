name: Schedule Test

on:
  schedule:
    # 3:39 PM America/Chicago (CDT and CST)
    - cron: "39 20 * * *"
    - cron: "39 21 * * *"
    # 3:47 PM America/Chicago (CDT and CST)
    - cron: "47 20 * * *"
    - cron: "47 21 * * *"
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date
          TZ="America/Chicago" date

  job-1:
    if: github.event.schedule == '39 20 * * *' || github.event.schedule == '39 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 3:39 PM Central"

  job-2:
    if: github.event.schedule == '47 20 * * *' || github.event.schedule == '47 21 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 3:47 PM Central"