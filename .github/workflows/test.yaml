name: Schedule Test

on:
  schedule:
    # 2:35 PM America/Chicago (CDT and CST)
    - cron: "35 19 * * *"
    - cron: "35 20 * * *"
    # 2:40 PM America/Chicago (CDT and CST)
    - cron: "40 19 * * *"
    - cron: "40 20 * * *"
  workflow_dispatch:


jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date
          TZ="America/Chicago" date

  two-thirty-five:
    if: github.event.schedule == '35 19 * * *' || github.event.schedule == '35 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 2:35 PM Central"

  two-forty:
    if: github.event.schedule == '40 19 * * *' || github.event.schedule == '40 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 2:40 PM Central"