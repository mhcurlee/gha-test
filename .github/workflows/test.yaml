name: Schedule Test

on:
  schedule:
    - cron: "45 19 * * *"
    - cron: "50 19 * * *"
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date
          TZ="America/Chicago" date

  job-1:
    if: github.event.schedule == '45 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 2:45 PM Central"

  job-2:
    if: github.event.schedule == '50 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello World from 2:50 PM Central"